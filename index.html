<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- font icon  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind css add link -->
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css -->
    <style>  
        * {
            font-family: "Geist", sans-serif;
        }
        
    </style>

</head>
<body  class="body-set bg-[#F8FAFC]">
    <section id="login-page" class="flex flex-col items-center justify-center container mx-auto min-h-screen">
        <div class="bg-[#FFFFFF] p-8 rounded-lg shadow-lg text-center">
            <div class="pt-8 flex items-center justify-center">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h1 class="text-2xl font-semibold mb-2 mt-6 text[#1F2937]">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] text-base mb-6">Sign in to manage your issues</p>
            <p class="text-left mb-2 text-[#1F2937] text-base">Username</p>
            <input id="username" type="text" placeholder="Enter Username" class="w-full border p-2 mb-4 rounded-lg border-[#E4E4E7]">
            <p class="text-left mb-2 text-[#1F2937] text-base">Password</p>
            <input id="password" type="password" placeholder="Enter Password" class="w-full border p-2 mb-6 rounded-lg border-[#E4E4E7]">
            <button onclick="handleLogin()" class="w-full bg-[#4A00FF] text-white p-2 rounded hover:bg-green-400 mb-6">Sign In</button>
            <div class="flex items-center mb-6">
                <div class="flex-grow border-t border-[#E4E4E7]"></div>
                <span class="px-2.5 text-[1F2937] text-base">OR</span>
                <div class="flex-grow border-t border-[#E4E4E7]"></div>
            </div>
            <p class="text-sm text-[#64748B] mb-2">
                Demo Credentials:
            </p>
            <div class="py-6 text-base text-center bg-[#F8FAFC] p-2 border-none">
                <p>
                    <span class="font-semibold">Username:</span> admin
                </p>
                <p>
                    <span class="font-semibold">Password:</span> admin123
                </p>
            </div>
        </div>
    </section>

    <section id="main-page" class="hidden">
        <nav class="bg-[#FFFFFF] shadow py-4 flex justify-between items-center px-20">
            <div class="font-bold text-xl flex gap-1 justify-center items-center">
                <img class="w-9" src="./assets/github-logo.png" alt="">
                <p class="text-2xl">
                    GitHub Issues Tracker 
                </p>
            </div>
            <div class="flex gap-4">
                <input id="searchinput" type="text" placeholder="Search issues..." class="border border-[#E4E4E7] p-2 rounded text-[#64748B]">
                <button id="btnsearch" onclick="handleSearch()" class="bg-[#4A00FF] text-[#FFFFFF] px-4 py-2.5 rounded">+ New Issue</button>
            </div>
        </nav>

        <div class="container mx-auto mt-8 p-4">
            <div class="flex gap-4 mb-6 border-none shadow-md rounded-lg bg-[#FFFFFF] p-6">
                <button onclick="filterIssues('all')" class="tab-btn font-semibold bg-[#4A00FF] text-[#FFFFFF] border-none px-12 py-3 rounded-sm">All</button>
                <button onclick="filterIssues('open')" class="tab-btn font-semibold bg-[#FFFFFF] text-[#64748B] border-[#E4E4E7] border px-9 py-3 rounded-sm"> Open </button>
                <button onclick="filterIssues('closed')" class="tab-btn font-semibold bg-[#FFFFFF] text-[#64748B] border-[#E4E4E7] border px-8 py-3 rounded-sm">Closed</button>
            </div>

            <div id="loader" class="hidden text-center py-10 font-bold">Loading...</div>

            <div class="flex gap-4 mb-6 border-none shadow-md rounded-lg bg-[#FFFFFF] p-6">
                <div class="flex gap-4">
                    <img class="rounded-full border-12 border-[#ECE4FF]" src="./assets/Aperture.png" alt="">
                    <div>
                        <h2 class="text-xl font-bold"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>

            </div>
            <div id="issuescontainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            </div>
        </div>
    </section>



    <script src="./js/index.js"></script>
</body>
</html>
